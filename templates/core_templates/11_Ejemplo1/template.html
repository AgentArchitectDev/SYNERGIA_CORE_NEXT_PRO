<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{brand.name}} | {{hero.title}}</title>

<meta name="template" content="arq_bento_02">
<meta name="category" content="arquitectura_premium">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Syne:wght@400;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/scrollreveal"></script>

<style>
:root {
    --bg: {{theme.bg}};
    --accent: {{theme.accent}};
    --card: {{theme.card}};
    --border: {{theme.border}};
}

body {
    background: var(--bg);
    color: white;
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
}

.syne { font-family: 'Syne', sans-serif; }

/* EFECTO SYNERGIA */
.img-reveal { filter: grayscale(100%); transition: 0.8s; }
.bento-item:hover .img-reveal { filter: grayscale(0%); transform: scale(1.05); }

/* GRID */
.bento-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    grid-auto-rows: 220px;
    gap: 1.5rem;
}

.bento-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2rem;
    overflow: hidden;
    position: relative;
    transition: 0.4s;
}

.bento-item:hover {
    border-color: var(--accent);
}

/* BOTON */
.btn-main {
    background: var(--accent);
    color: black;
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: bold;
}

</style>
</head>

<body class="p-6 md:p-10">

<!-- NAV -->
<nav class="flex justify-between items-center mb-20">

    <div class="syne text-2xl font-black">
        {{brand.name}}
    </div>

    <div class="hidden md:flex gap-10 text-xs uppercase">
        {{#nav}}
        <a href="{{link}}" class="hover:text-[var(--accent)]">{{label}}</a>
        {{/nav}}
    </div>

    <button class="btn-main">
        {{cta.primary}}
    </button>

</nav>

<!-- HERO -->
<section class="mb-32 max-w-5xl">

    <h1 class="syne text-5xl md:text-8xl font-black mb-8 leading-tight">
        {{hero.title}}
    </h1>

    <p class="text-gray-400 text-lg max-w-xl">
        {{hero.description}}
    </p>

</section>

<!-- BENTO GRID -->
<section class="bento-grid max-w-7xl mx-auto mb-32">

    {{#projects}}

    <div class="bento-item col-span-4 md:col-span-2 row-span-2 group">

        <img src="{{image}}" class="img-reveal absolute inset-0 w-full h-full object-cover opacity-60">

        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>

        <div class="absolute bottom-6 left-6">
            <span class="text-[var(--accent)] text-xs uppercase">{{tag}}</span>
            <h3 class="text-2xl font-bold syne">{{title}}</h3>
        </div>

    </div>

    {{/projects}}

</section>

<!-- SERVICIOS -->
<section class="max-w-6xl mx-auto mb-32">

    <h2 class="text-3xl font-bold mb-10">Servicios</h2>

    <div class="grid md:grid-cols-3 gap-8">

        {{#services}}
        <div class="p-6 border border-[var(--border)] rounded-xl">
            <h3 class="font-bold mb-2">{{title}}</h3>
            <p class="text-sm text-gray-400">{{desc}}</p>
        </div>
        {{/services}}

    </div>

</section>

<!-- FOOTER -->
<footer class="border-t border-[var(--border)] pt-10">

    <div class="flex flex-col md:flex-row justify-between gap-10">

        <div>
            <h2 class="text-2xl font-bold mb-2">{{footer.title}}</h2>
            <p class="text-gray-500 text-sm">{{footer.text}}</p>
        </div>

        <div class="flex gap-6 text-sm">
            {{#social}}
            <a href="{{link}}">{{name}}</a>
            {{/social}}
        </div>

    </div>

</footer>

<script>
ScrollReveal().reveal('.bento-item, h1, p', {
    delay: 200,
    distance: '40px',
    duration: 800,
    origin: 'bottom'
});
</script>

</body>
</html>
