<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYNERGIA VISUAL CMS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body class="bg-black text-white">

<div id="app"></div>

<script type="text/babel">

function App() {

    const [blocks, setBlocks] = React.useState([])

    const [selectedBlock, setSelectedBlock] = React.useState(null)

    const [formData, setFormData] = React.useState({})

    React.useEffect(() => {

        fetch('http://127.0.0.1:8000/blocks')
            .then(r => r.json())
            .then(data => {

                setBlocks(data.blocks)

                if (data.blocks.length > 0) {
                    setSelectedBlock(data.blocks[0])
                }

            })

    }, [])

    function updateField(id, value) {

        setFormData(prev => ({
            ...prev,
            [id]: value
        }))
    }

    return (

        <div className="flex min-h-screen">

            <aside className="w-[320px] bg-zinc-950 border-r border-zinc-800 p-6">

                <h1 className="text-2xl font-bold mb-8">
                    ⚡ SYNERGIA CMS
                </h1>

                <div className="space-y-3">

                    {blocks.map(block => (

                        <button
                            key={block.id}
                            onClick={() => setSelectedBlock(block)}
                            className="w-full text-left bg-zinc-900 hover:bg-zinc-800 p-4 rounded-2xl"
                        >

                            <div className="font-bold">
                                {block.name}
                            </div>

                            <div className="text-xs text-zinc-400 mt-1">
                                {block.category}
                            </div>

                        </button>

                    ))}

                </div>

                {selectedBlock && (

                    <div className="mt-10">

                        <h2 className="text-lg font-bold mb-4">
                            Campos
                        </h2>

                        <div className="space-y-4">

                            {selectedBlock.fields.map(field => (

                                <div key={field.id}>

                                    <label className="text-sm text-zinc-400">
                                        {field.id}
                                    </label>

                                    {field.type === "textarea" ? (

                                        <textarea
                                            className="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-3 mt-2"
                                            onChange={(e) =>
                                                updateField(field.id, e.target.value)
                                            }
                                        />

                                    ) : (

                                        <input
                                            className="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-3 mt-2"
                                            onChange={(e) =>
                                                updateField(field.id, e.target.value)
                                            }
                                        />

                                    )}

                                </div>

                            ))}

                        </div>

                    </div>

                )}

            </aside>

            <main className="flex-1 bg-zinc-100 text-black p-10">

                <div className="bg-white rounded-3xl shadow-2xl min-h-full p-10">

                    <h1 className="text-6xl font-black">
                        {formData.title || "SYNERGIA CMS"}
                    </h1>

                    <p className="text-2xl mt-6 text-zinc-600">
                        {formData.subtitle || "Visual AI Builder"}
                    </p>

                    <button className="mt-8 bg-black text-white px-8 py-4 rounded-2xl">
                        {formData.button || "Comenzar"}
                    </button>

                </div>

            </main>

        </div>

    )
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />)

</script>

</body>
</html>
