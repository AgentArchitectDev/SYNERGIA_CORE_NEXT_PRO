<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYNERGIA CMS PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background:#0a0a0a;
    color:white;
}

.sidebar {
    width:260px;
    background:#111;
    border-right:1px solid #222;
}

.input {
    background:#111;
    border:1px solid #333;
    padding:10px;
    border-radius:8px;
    width:100%;
}

.btn {
    background:#00ff88;
    color:black;
    padding:10px;
    border-radius:8px;
    font-weight:bold;
}

iframe {
    background:white;
}
</style>
</head>

<body class="flex h-screen">

<!-- SIDEBAR -->
<div class="sidebar p-6 flex flex-col gap-6">

    <h1 class="text-xl font-bold">⚡ SYNERGIA CMS</h1>

    <!-- TEMPLATE -->
    <div>
        <label class="text-xs text-gray-400">Template</label>
        <select id="template" class="input"></select>
    </div>

    <!-- CLIENTE -->
    <div>
        <label class="text-xs text-gray-400">Cliente</label>
        <select id="cliente" class="input"></select>
    </div>

    <!-- DATOS -->
    <div class="flex flex-col gap-3">

        <input id="brand_name" placeholder="Marca" class="input">
        <input id="hero_title" placeholder="Título" class="input">
        <input id="hero_subtitle" placeholder="Subtítulo" class="input">

    </div>

    <!-- BOTON -->
    <button onclick="generar()" class="btn">
        🚀 GENERAR WEB
    </button>

    <div id="status" class="text-sm text-gray-400"></div>

</div>

<!-- PREVIEW -->
<div class="flex-1">

    <iframe id="preview" class="w-full h-full"></iframe>

</div>

<script src="app.js"></script>

</body>
</html>
