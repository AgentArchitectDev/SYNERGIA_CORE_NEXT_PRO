<section style="
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:
linear-gradient(
135deg,
#050505,
#111827
);
padding:80px 20px;
font-family:Arial;
overflow:hidden;
position:relative;
">

<div style="
position:absolute;
width:600px;
height:600px;
background:#00f2ff20;
filter:blur(120px);
border-radius:100%;
top:-200px;
right:-200px;
"></div>

<div style="
position:relative;
z-index:2;
max-width:900px;
">

<h1 style="
font-size:72px;
font-weight:900;
color:white;
line-height:1.1;
margin-bottom:24px;
letter-spacing:-2px;
">

{{title}}

</h1>

<p style="
font-size:22px;
color:#d1d5db;
line-height:1.7;
margin-bottom:50px;
max-width:700px;
margin-left:auto;
margin-right:auto;
">

{{subtitle}}

</p>

<a
href="#"
style="
display:inline-block;
padding:20px 42px;
background:#00f2ff;
color:black;
font-size:18px;
font-weight:800;
border-radius:14px;
text-decoration:none;
box-shadow:
0 0 30px #00f2ff50;
transition:0.3s;
"
>

{{button}}

</a>

</div>

</section>
